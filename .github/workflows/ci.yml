name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.mlc_config.json'
        continue-on-error: true

      - name: Validate YAML frontmatter
        run: |
          find runbooks/ -name "*.md" -exec grep -l "^---" {} \; | while read f; do
            echo "Checking $f"
          done
          echo "Runbook lint complete"
